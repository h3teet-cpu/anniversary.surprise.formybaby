  <!DOCTYPE html>
<html>
<head>
  <title>Happy Anniversary</title>
  <style>
    body {
      background: pink;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: white;
      border-radius: 25px;
      padding: 25px;
      max-width: 400px;
      margin: auto;
    }

    img {
      width: 250px;
      border-radius: 20px;
    }

    button {
      background: hotpink;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Happy Anniversary 💗</h1>

    <p>To my love,</p>

    <p>
      Happy 4 years baby! I made this little website just for you. Thank you for being in my life.
      I love you so much 💕
    </p>

    <button onclick="showMessage()">Click me</button>

    <p id="secret"></p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("secret").innerHTML =
        "You are my favorite person forever and I can't wait to spend the rest of my life with you honey 💖";
    }
  </script>
</body>
  <script>
  function makeHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "💗";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.bottom = "-30px";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    heart.style.animation = "floatUp 5s linear";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  setInterval(makeHeart, 400);
</script>

<style>
  @keyframes floatUp {
    from {
      transform: translateY(0);
      opacity: 1;
    }
    to {
      transform: translateY(-110vh);
      opacity: 0;
    }
  }
</style>
  <script>
function answer1() {
  document.getElementById("q1").innerHTML = "Correct hehe 💗 I love you the most.";
}

function answer2() {
  document.getElementById("q2").innerHTML = "Good answer 😌💕";
}

function answer3() {
  document.getElementById("q3").innerHTML = "You better keep that promise 🥹💖";
}
</script>
</body>
  <h2>Little Love Quiz 💌</h2>

<p>Who loves you the most?</p>
<button onclick="answer1()">Me 💗</button>
<button onclick="answer1()">Also me 😌</button>
<p id="q1"></p>

<p>Do you love me?</p>
<button onclick="answer2()">Yes</button>
<button onclick="answer2()">Of course</button>
<p id="q2"></p>

<p>Will you give me hugs forever?</p>
<button onclick="answer3()">Yes baby</button>
<button onclick="answer3()">Always</button>
<p id="q3"></p>
</html>
